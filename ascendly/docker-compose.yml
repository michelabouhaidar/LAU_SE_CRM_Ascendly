networks:
  ascendly_net:
    driver: bridge

volumes:
  postgres_data:
  node_modules_backend:
  node_modules_frontend:

services:

  db:
    build: ./postgres
    container_name: ascendly_db
    restart: unless-stopped
    env_file: .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ascendly_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: ascendly_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
      - node_modules_backend:/app/node_modules
    networks:
      - ascendly_net
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: ascendly_frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - node_modules_frontend:/app/node_modules
    networks:
      - ascendly_net
    depends_on:
      - backend

  nginx:
    build: ./nginx
    container_name: ascendly_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - ascendly_net
    depends_on:
      - frontend
      - backend
